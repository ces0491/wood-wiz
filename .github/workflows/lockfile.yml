name: Lockfile guard

on:
  pull_request:
    paths:
      - package.json
      - package-lock.json
      - .github/workflows/lockfile.yml
  push:
    branches: [main]
    paths:
      - package.json
      - package-lock.json
      - .github/workflows/lockfile.yml

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Verify lockfile is installable on Linux
        run: npm ci --dry-run
