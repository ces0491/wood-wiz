name: Lockfile guard

on:
  pull_request:
    paths:
      - package.json
      - package-lock.json
      - .github/workflows/lockfile.yml
  push:
    branches: [main]
    paths:
      - package.json
      - package-lock.json
      - .github/workflows/lockfile.yml

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Regenerate lockfile with Linux platform overrides
        run: npm run lock:refresh

      - name: Fail if lockfile changed
        run: |
          if ! git diff --quiet package-lock.json; then
            echo "::error::package-lock.json is out of sync with package.json."
            echo "Run 'npm run lock:refresh' locally and commit the result."
            git diff --stat package-lock.json
            echo "---FULL DIFF---"
            git --no-pager diff package-lock.json
            echo "---NODE/NPM VERSIONS---"
            node --version
            npm --version
            exit 1
          fi
          echo "Lockfile is in sync."
