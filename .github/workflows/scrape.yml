name: Scrape wood prices

on:
  schedule:
    # Daily at 03:00 UTC (05:00 SAST)
    - cron: "0 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci

      - name: Run scrapers
        run: npm run scrape

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/products.json; then
            echo "No price changes to commit."
          else
            git add data/products.json
            git commit -m "chore(data): refresh wood prices"
            git push
          fi
